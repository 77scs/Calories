<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Calories</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ===== iOS System ===== */
:root{--bg:#0d0d0d;--grouped:#0d0d0d;--surface:#1c1c1e;--surface2:#2c2c2e;--surface3:#3a3a3c;--sep:rgba(255,255,255,.08);--sep2:rgba(255,255,255,.04);--text:#f5f5f5;--text2:#8e8e93;--text3:#636366;--accent:#fff;--green:#30d158;--red:#ff453a;--radius:10px;--gr:13px;--navBg:rgba(13,13,13,.82)}
body.light{--bg:#f2f2f7;--grouped:#f2f2f7;--surface:#fff;--surface2:#f2f2f7;--surface3:#e5e5ea;--sep:rgba(60,60,67,.08);--sep2:rgba(60,60,67,.03);--text:#1c1c1e;--text2:#8e8e93;--text3:#aeaeb2;--accent:#000;--green:#30d158;--red:#ff453a;--navBg:rgba(242,242,247,.82)}

body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--grouped);color:var(--text);min-height:100vh;display:flex;justify-content:center;-webkit-font-smoothing:antialiased;overflow-x:hidden;padding:0 0 90px}
::selection{background:var(--accent);color:var(--bg)}
::placeholder{color:var(--text3);opacity:1}
input{caret-color:var(--accent)}
*{-webkit-tap-highlight-color:transparent;tap-highlight-color:transparent}

/* ===== Haptic Animations ===== */
@keyframes hapt{0%{transform:scale(1)}25%{transform:scale(.965)}50%{transform:scale(1.008)}75%{transform:scale(.995)}to{transform:scale(1)}}
@keyframes haptL{0%{transform:scale(1)}25%{transform:scale(.97)}to{transform:scale(1)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes shimmer{0%{background-position:-300px 0}to{background-position:300px 0}}
@keyframes shake{0%,to{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,to{opacity:1}50%{opacity:.5}}

/* ===== Nav ===== */
.nav-wrap{position:sticky;top:0;z-index:50;padding-top:env(safe-area-inset-top,44px);background:var(--navBg);backdrop-filter:blur(50px) saturate(1.4);-webkit-backdrop-filter:blur(50px) saturate(1.4);border-bottom:1px solid var(--sep)}
.nav{display:flex;align-items:baseline;justify-content:space-between;padding:11px 20px 10px;max-width:500px;margin:0 auto}
.nav h1{font-size:34px;font-weight:800;letter-spacing:-.4px}
.nav .date{font-size:15px;color:var(--text2);font-weight:400}

/* ===== Main ===== */
.main{max-width:500px;width:100%;margin:0 auto;padding:0 16px}

/* ===== Summary ===== */
.summary{background:var(--surface);border-radius:var(--gr);margin:18px 0;padding:18px 20px;animation:fade .4s ease}
.summary-in{display:flex;align-items:center;gap:18px}
.ring{flex-shrink:0;position:relative;width:76px;height:76px}
.ring svg{transform:rotate(-90deg)}
.ring .bg{fill:none;stroke:var(--surface2);stroke-width:4.5}
.ring .fg{fill:none;stroke:var(--accent);stroke-width:4.5;stroke-linecap:round;transition:stroke-dashoffset 1.2s cubic-bezier(.22,1,.36,1)}
.ring .ct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring .ct .v{font-size:24px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-.3px}
.ring .ct .l{font-size:11px;color:var(--text2);margin-top:1px}
.s-right{flex:1}
.s-right .g{font-size:13px;color:var(--text2);display:flex;align-items:center;gap:4px}
.s-right .g span{font-weight:600;color:var(--text)}
.s-right .bar{height:5px;background:var(--surface2);border-radius:5px;overflow:hidden;margin-top:9px}
.s-right .bar .fill{height:100%;background:var(--accent);border-radius:5px;transition:width 1.2s cubic-bezier(.22,1,.36,1);width:0%}

/* ===== Skeleton ===== */
.skel{display:flex;flex-direction:column;gap:10px;padding:6px 0}
.skel .l{height:14px;border-radius:7px;background:linear-gradient(90deg,var(--surface2) 25%,var(--surface3) 50%,var(--surface2) 75%);background-size:300px 100%;animation:shimmer 1.8s infinite}
.skel .l:nth-child(1){width:55%}
.skel .l:nth-child(2){width:80%}
.skel .l:nth-child(3){width:40%}

/* ===== Section ===== */
.sec{margin:0 0 22px}
.sec-label{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;padding-left:4px}
.sec-card{background:var(--surface);border-radius:var(--gr);overflow:hidden;animation:fade .45s ease}
.sec-card+.sec-card{margin-top:8px}

/* ===== Cell ===== */
.cell{display:flex;align-items:center;gap:12px;padding:13px 16px;min-height:44px;border-bottom:1px solid var(--sep);background:var(--surface);transition:background .12s;position:relative;overflow:hidden}
.cell:last-child{border-bottom:none}
.cell:active{background:var(--surface2);animation:haptL .3s ease}
.cell .col{flex:1;min-width:0}
.cell .col .t{font-size:16px;font-weight:400;letter-spacing:-.2px}
.cell .col .s{font-size:12px;color:var(--text2);margin-top:2px}
.cell .badge{font-size:16px;font-weight:600;font-variant-numeric:tabular-nums;letter-spacing:-.2px;color:var(--text2);transition:color .2s}
.cell:active .badge{color:var(--text)}

/* ===== Upload ===== */
.upload{background:var(--surface);border-radius:var(--gr);padding:16px}
.drop{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:88px;padding:18px 12px;border:2px dashed var(--sep);border-radius:10px;cursor:pointer;transition:border-color .25s,background .25s;position:relative;background:var(--grouped)}
.drop:active{background:var(--surface2)}
.drop.dragover{border-color:var(--accent);background:var(--surface2)}
.drop .icon{font-size:24px;opacity:.35;margin-bottom:5px;pointer-events:none}
.drop .text{font-size:14px;font-weight:500;color:var(--text2);pointer-events:none}
.drop .sub{font-size:11px;color:var(--text3);margin-top:3px;pointer-events:none}
.drop img{max-width:100%;max-height:140px;border-radius:8px;object-fit:contain;display:block;pointer-events:none}
.drop.has-img{padding:6px}
.drop.has-img .icon,.drop.has-img .text,.drop.has-img .sub{display:none}
.drop .x{position:absolute;top:6px;right:6px;width:26px;height:26px;border-radius:50%;background:rgba(0,0,0,.5);border:none;color:#fff;font-size:14px;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:2;transition:transform .2s,background .2s}
.drop .x:active{transform:scale(.82);background:rgba(0,0,0,.7)}
.drop.has-img .x{display:flex}

/* ===== Segmented ===== */
.seg{display:flex;gap:0;background:var(--grouped);border-radius:8px;padding:2px;margin-top:11px}
.seg button{flex:1;padding:8px 12px;border:none;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;color:var(--text2);background:transparent;transition:all .3s cubic-bezier(.22,1,.36,1)}
.seg button:active{opacity:.6}
.seg button.on{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.12)}

/* ===== Buttons ===== */
.btn-p{display:block;width:100%;margin-top:11px;padding:14px;border:none;border-radius:12px;font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;background:var(--accent);color:var(--bg);transition:opacity .25s}
.btn-p:active{animation:hapt .35s ease}
.btn-p:disabled{opacity:.15;cursor:not-allowed}
.btn-p:disabled:active{animation:none}
.btn-g{background:transparent;border:none;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;color:var(--text2);padding:14px;display:block;width:100%;text-align:center;transition:opacity .2s}
.btn-g:active{opacity:.4}
.btn-f{padding:0;border:none;background:transparent;color:var(--accent);font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;transition:opacity .2s}
.btn-f:active{opacity:.4}

/* ===== Search ===== */
.search-wrap{background:var(--surface);border-radius:var(--gr);margin-top:8px;padding:12px 16px}
.search{display:flex;align-items:center;gap:8px;background:var(--grouped);border-radius:10px;padding:0 12px;border:1px solid var(--sep);transition:border-color .25s,background .25s}
.search:focus-within{border-color:var(--accent);background:var(--surface)}
.search .mag{font-size:14px;color:var(--text3);flex-shrink:0;pointer-events:none}
.search input{flex:1;padding:10px 0;border:none;background:transparent;color:var(--text);font-size:16px;font-weight:400;outline:none;font-family:inherit}
.search .add{padding:6px 16px;border:none;border-radius:8px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;background:var(--accent);color:var(--bg);transition:opacity .2s}
.search .add:active{animation:hapt .3s ease}

/* ===== Total ===== */
.total-r{display:flex;justify-content:space-between;align-items:center;padding:14px 16px}
.total-r .l{font-size:14px;font-weight:600;color:var(--text2)}
.total-r .v{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.3px}

/* ===== Stepper ===== */
.stepper{display:inline-flex;align-items:center;gap:0;margin-top:3px;background:var(--surface2);border-radius:7px;overflow:hidden}
.stepper button{width:26px;height:24px;border:none;background:transparent;color:var(--text2);font-size:16px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;transition:background .15s}
.stepper button:active{background:var(--surface3)}
.stepper span{min-width:32px;text-align:center;font-size:12px;font-weight:500;color:var(--text);font-variant-numeric:tabular-nums}

/* ===== History ===== */
.hist-list{max-height:300px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.hist-list::-webkit-scrollbar{width:3px}
.hist-list::-webkit-scrollbar-thumb{background:var(--text3);border-radius:2px}
.hist-g{padding:13px 16px 9px;border-bottom:1px solid var(--sep);animation:fadeUp .4s cubic-bezier(.22,1,.36,1) both}
.hist-g:nth-child(1){animation-delay:0s}
.hist-g:nth-child(2){animation-delay:.05s}
.hist-g:nth-child(3){animation-delay:.1s}
.hist-g:last-child{border-bottom:none}
.hist-g .hd{display:flex;justify-content:space-between;font-size:12px;font-weight:600;color:var(--text2);padding-bottom:7px;letter-spacing:-.1px}
.hist-r{display:flex;align-items:center;padding:6px 16px;font-size:15px;gap:10px;background:var(--surface);transition:background .12s;margin:0 -16px;position:relative;overflow:hidden}
.hist-r:active{background:var(--surface2)}
.hist-r .t{color:var(--text2);font-size:12px;min-width:38px}
.hist-r .f{flex:1}
.hist-r .k{font-weight:600;font-variant-numeric:tabular-nums;color:var(--text2);transition:color .2s}
.hist-r:active .k{color:var(--text)}
.hist-empty{padding:36px 16px;text-align:center;color:var(--text2);font-size:14px}
.hist-empty .e{font-size:40px;opacity:.2;margin-bottom:8px;display:block}

/* ===== Refresh Indicator ===== */
.refresh{display:none;align-items:center;justify-content:center;gap:8px;padding:10px 0 0;font-size:12px;color:var(--text2)}
.refresh.on{display:flex;animation:fade .2s ease}
.refresh .spin{width:16px;height:16px;border:2px solid var(--sep);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== Context Menu ===== */
.cm{position:fixed;inset:0;z-index:9996;display:none;align-items:flex-end;justify-content:center;padding:20px 16px env(safe-area-inset-bottom,16px)}
.cm.on{display:flex}
.cm .bg{position:absolute;inset:0;background:rgba(0,0,0,.3)}
.cm .m{position:relative;background:var(--surface);border-radius:14px;width:100%;max-width:400px;overflow:hidden;padding:8px 0;animation:fadeUp .35s cubic-bezier(.22,1,.36,1)}
.cm .m button{display:block;width:100%;padding:14px 20px;border:none;background:transparent;color:var(--text);font-size:17px;font-weight:400;font-family:inherit;cursor:pointer;text-align:center;border-bottom:1px solid var(--sep);transition:background .12s}
.cm .m button:last-child{border-bottom:none}
.cm .m button:active{background:var(--surface2)}
.cm .m button.dg{color:var(--red);font-weight:600}

/* ===== Sheet ===== */
.sheet{position:fixed;inset:0;z-index:9998;display:flex;align-items:flex-end;justify-content:center;padding:20px 16px env(safe-area-inset-bottom,16px);visibility:hidden;opacity:0;transition:visibility .35s,opacity .35s}
.sheet.on{visibility:visible;opacity:1}
.sheet .bg{position:absolute;inset:0;background:rgba(0,0,0,.3)}
.sheet .c{position:relative;background:var(--surface);border-radius:14px;width:100%;max-width:400px;overflow:hidden;padding:24px 20px 22px;transform:translateY(20px) scale(.96);opacity:0;transition:transform .45s cubic-bezier(.22,1,.36,1),opacity .45s cubic-bezier(.22,1,.36,1)}
.sheet.on .c{transform:translateY(0) scale(1);opacity:1}
.sheet .c h3{font-size:17px;font-weight:700;text-align:center;margin-bottom:4px}
.sheet .c p{font-size:13px;color:var(--text2);text-align:center;line-height:1.45;margin-bottom:20px}
.sheet .c .btns{display:flex;gap:8px}
.sheet .c .btns button{flex:1;padding:14px;border:none;border-radius:11px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;transition:opacity .2s}
.sheet .c .btns button:active{opacity:.5}
.sheet .c .btns .dg{background:var(--red);color:#fff}
.sheet .c .btns .cn{background:var(--surface2);color:var(--text)}

/* ===== Toast ===== */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px) scale(.92);max-width:350px;width:90%;padding:13px 22px;border-radius:13px;font-size:14px;font-weight:500;text-align:center;z-index:9999;background:rgba(40,40,40,.92);color:var(--text2);opacity:0;visibility:hidden;transition:transform .5s cubic-bezier(.22,1,.36,1),opacity .5s cubic-bezier(.22,1,.36,1),visibility .5s;backdrop-filter:blur(35px) saturate(1.3);-webkit-backdrop-filter:blur(35px) saturate(1.3);box-shadow:0 8px 35px rgba(0,0,0,.5)}
.toast.on{transform:translateX(-50%) translateY(0) scale(1);opacity:1;visibility:visible}
body.light .toast{background:rgba(255,255,255,.92)}
.toast.ok{color:var(--green)}
.toast.err{color:var(--red);animation:shake .4s ease}

/* ===== Loading ===== */
.loading{display:flex;position:fixed;inset:0;background:rgba(0,0,0,.35);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);z-index:9997;align-items:center;justify-content:center;flex-direction:column;opacity:0;visibility:hidden;transition:opacity .35s,visibility .35s}
.loading.on{opacity:1;visibility:visible}
.spin{position:relative;width:44px;height:44px}
.spin i{position:absolute;width:100%;height:100%;border:3.5px solid var(--surface2);border-top-color:var(--accent);border-radius:50%;animation:spin .55s cubic-bezier(.6,0,.4,1) infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading .msg{margin-top:16px;font-size:16px;font-weight:500;color:var(--text2);letter-spacing:-.1px}

/* ===== Model ===== */
.model-bar{text-align:center;font-size:12px;color:var(--text2);padding:10px 0 2px;min-height:22px;transition:opacity .4s}
.model-bar.ok{color:var(--green)}
.model-bar.er{color:var(--red)}

/* ===== Theme ===== */
.theme-toggle{position:fixed;bottom:24px;right:24px;padding:8px 16px;border-radius:9px;border:none;cursor:pointer;z-index:100;font-family:inherit;font-size:13px;font-weight:600;letter-spacing:.2px;box-shadow:0 2px 14px rgba(0,0,0,.4);transition:transform .25s cubic-bezier(.22,1,.36,1),opacity .25s;background:#111;color:#fff}
.theme-toggle:active{animation:hapt .3s ease}
.theme-toggle.l{background:#fff;color:#111;border:1px solid #ddd}
@media(max-width:480px){.theme-toggle{bottom:16px;right:16px;font-size:12px;padding:6px 14px}}

#fileInput{display:none}
</style>
</head>
<body>

<div style="max-width:500px;width:100%">

  <div class="nav-wrap">
    <div class="nav">
      <h1>Calories</h1>
      <div class="date" id="dateLabel"></div>
    </div>
  </div>

  <div class="main">

    <!-- Summary -->
    <div class="summary">
      <div class="summary-in">
        <div class="ring">
          <svg width="76" height="76" viewBox="0 0 76 76">
            <circle class="bg" cx="38" cy="38" r="32.75"/>
            <circle class="fg" id="ringArc" cx="38" cy="38" r="32.75" stroke-dasharray="205.77" stroke-dashoffset="205.77"/>
          </svg>
          <div class="ct">
            <div class="v" id="dailyKcal">0</div>
            <div class="l">kcal</div>
          </div>
        </div>
        <div class="s-right">
          <div class="g">Objectif <span id="goalText">2 000 kcal</span></div>
          <div class="bar"><div class="fill" id="barFill"></div></div>
        </div>
      </div>
    </div>

    <!-- Analyse -->
    <div class="sec">
      <div class="sec-label">Analyse</div>
      <div class="upload">
        <div class="drop" id="dropZone">
          <div class="icon">&#128247;</div>
          <div class="text">Prendre une photo</div>
          <div class="sub">ou glisser-déposer</div>
          <button class="x" id="removeBtn">&times;</button>
        </div>
        <div id="modelSkel" class="skel" style="padding:10px 0 4px">
          <div class="l"></div><div class="l"></div><div class="l"></div>
        </div>
        <div class="seg">
          <button class="on" id="cameraBtn">Appareil</button>
          <button id="uploadBtn">Galerie</button>
        </div>
        <button class="btn-p" id="analyzeBtn" disabled>Analyser</button>
        <div id="modelBar" class="model-bar">Initialisation IA…</div>
      </div>
    </div>

    <!-- Résultats -->
    <div class="sec" id="resultsSection" style="display:none">
      <div class="sec-label">Résultats</div>
      <div class="sec-card" id="resultsList"></div>
      <div class="sec-card" id="totalCard" style="display:none;margin-top:8px">
        <div class="total-r">
          <div class="l">Total</div>
          <div class="v" id="totalKcal">0</div>
        </div>
      </div>
      <div class="search-wrap">
        <div class="search">
          <span class="mag">&#128269;</span>
          <input type="text" id="manualInput" placeholder="Ajouter un aliment">
          <button class="add" id="manualAddBtn">+</button>
        </div>
      </div>
    </div>

    <!-- Journal -->
    <div class="sec">
      <div class="sec-label">Journal</div>
      <div id="refreshIndicator" class="refresh"><div class="spin"></div>Rafraîchir…</div>
      <div class="sec-card" id="historyCard">
        <div class="hist-empty"><span class="e">&#128220;</span>Aucun repas enregistré</div>
      </div>
      <button class="btn-g" id="clearHistoryBtn">Effacer le journal</button>
    </div>

  </div>
</div>

<button class="theme-toggle" id="themeToggle">noir</button>

<!-- Loading -->
<div class="loading" id="loadingOverlay">
  <div class="spin"><i></i></div>
  <div class="msg" id="loadingMsg">Analyse en cours…</div>
</div>

<!-- Action Sheet -->
<div class="sheet" id="actionSheet">
  <div class="bg" id="sheetBg"></div>
  <div class="c">
    <h3 id="sheetTitle">Confirmer</h3>
    <p id="sheetMsg">Voulez-vous effacer tout le journal&#160;?</p>
    <div class="btns">
      <button class="cn" id="sheetCancel">Annuler</button>
      <button class="dg" id="sheetConfirm">Effacer</button>
    </div>
  </div>
</div>

<!-- Context Menu -->
<div class="cm" id="ctxMenu">
  <div class="bg" id="ctxBg"></div>
  <div class="m">
    <button id="ctxDelete" class="dg">Retirer</button>
    <button id="ctxCancel">Annuler</button>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*">

<script>
(function(){
'use strict';

// ===== Config =====

// ===== Detection =====
async function detect(img){
  if(!model)return[];
  try{
    var p=await model.detect(img);
    return Object.values(p.filter(function(x){return x.score>=.4&&FC.has(x.class)}).map(function(x){return {c:x.class,s:Math.round(x.score*100)}}).reduce(function(a,x){if(!a[x.c]||x.s>a[x.c].s)a[x.c]=x;return a},{}));
  }catch(e){return[]}
}
async function fd(f){
  try{
    var r=await fetch(USDA_URL+'?apiKey='+USDA_KEY+'&query='+encodeURIComponent(f)+'&pageSize=1&dataType=Foundation,SR Legacy');
    if(!r.ok)return null;var d=await r.json();
    if(!d.foods||!d.foods.length)return null;
    var n=d.foods[0].foodNutrients.find(function(x){return x.nutrientName&&x.nutrientName.toLowerCase().includes('energy')});
    return {n:d.foods[0].description||f,k:n?Math.round(n.value):null};
  }catch(e){return null}
}
async function fo(f){
  try{
    var r=await fetch(OFF_URL+'?search_terms='+encodeURIComponent(f)+'&json=1&page_size=1');
    if(!r.ok)return null;var d=await r.json();
    if(!d.products||!d.products.length)return null;
    var p=d.products[0],k=null;
    if(p.nutriments)k=p.nutriments['energy-kcal_100g']||p.nutriments['energy_100g']||null;
    return {n:p.product_name||f,k:k?Math.round(k):null};
  }catch(e){return null}
}
async function gn(k){
  var d=DB[k];if(d)return{n:d.n,k:d.k,src:'Locale'};
  var a=AL[k];if(a&&DB[a])return{n:DB[a].n,k:DB[a].k,src:'Locale'};
  var r=await fd(k);if(r&&r.k)return{n:r.n,k:r.k,src:'USDA'};
  r=await fo(k);if(r&&r.k)return{n:r.n,k:r.k,src:'OpenFoodFacts'};
  return null;
}

// ===== Analysis =====
async function analyze(){
  if(!imageData){toast('Ajoutez une photo','err');return}
  lo.classList.add('on');lm.textContent='Analyse…';
  try{
    var det=modelReady?await detect(imageData.element):[];
    if(!det.length){lo.classList.remove('on');toast(modelReady?'Aucun aliment détecté':'IA pas prête, utilisez la recherche','err');showRes([]);return}
    lm.textContent='Recherche des calories…';
    var items=[];
    for(var i=0;i<det.length;i++){
      var d=det[i],n=await gn(d.c),db=DB[d.c],gr=db?db.g:150;
      items.push({c:d.c,l:n?n.n:(d.c.charAt(0).toUpperCase()+d.c.slice(1)),k:n?n.k:null,g:gr,src:n?n.src:'?',s:d.s});
    }
    currentResults=items;lo.classList.remove('on');
    showRes(items);
    toast(items.length+' aliment(s)',items.some(function(x){return x.k!==null})?'ok':'err');
    sv(items);
  }catch(e){lo.classList.remove('on');toast('Erreur analyse','err')}
}

// ===== Display =====
function showRes(items){
  rs.style.display='block';
  if(!items.length){rl.innerHTML='<div class="cell" style="justify-content:center;color:var(--text2);font-size:15px;padding:22px;animation:fade .3s ease">Aucun résultat</div>';tc.style.display='none';return}
  var h='',t=0;
  for(var i=0;i<items.length;i++){
    var it=items[i],k=it.k!==null?Math.round(it.k*it.g/100):null,kd=k!==null?fmt(k)+' kcal':'?';
    if(k!==null)t+=k;
    h+='<div class="cell" style="animation:slideIn .4s cubic-bezier(.22,1,.36,1) both;animation-delay:'+(i*.07)+'s" data-idx="'+i+'"><div class="col"><div class="t">'+it.l+'</div><div class="s">'+it.s+'% &middot; '+it.src+'<div class="stepper"><button class="stepM" data-i="'+i+'">−</button><span class="stepV">'+it.g+'</span><span style="font-size:11px;color:var(--text2);margin-left:2px">g</span><button class="stepP" data-i="'+i+'">+</button></div></div></div><div class="badge">'+kd+'</div></div>';
  }
  rl.innerHTML=h;tk.textContent=fmt(t);tc.style.display='block';
  rl.querySelectorAll('.stepM').forEach(function(b){b.addEventListener('click',function(e){e.stopPropagation();step(this,-1)})});
  rl.querySelectorAll('.stepP').forEach(function(b){b.addEventListener('click',function(e){e.stopPropagation();step(this,1)})});
  rl.querySelectorAll('.cell').forEach(function(c){c.addEventListener('contextmenu',function(e){e.preventDefault()});var timer;c.addEventListener('touchstart',function(){timer=setTimeout(function(){showCtx(parseInt(c.getAttribute('data-idx')))},400)});c.addEventListener('touchend',function(){clearTimeout(timer)});c.addEventListener('touchmove',function(){clearTimeout(timer)})});
  up(t);
}
function step(el,dir){
  var i=parseInt(el.getAttribute('data-i'));
  if(!currentResults[i])return;
  var v=currentResults[i].g+dir*5;
  if(v<5)v=5;if(v>2000)v=2000;
  currentResults[i].g=v;
  var cell=el.closest('.cell');
  if(cell){
    cell.querySelector('.stepV').textContent=v;
    var k=currentResults[i].k!==null?Math.round(currentResults[i].k*v/100):null;
    var b=cell.querySelector('.badge');
    if(b)b.textContent=k!==null?fmt(k)+' kcal':'?';
  }
  recalc();
}
function recalc(){
  var items=currentResults;if(!items.length)return;
  var t=0,rows=rl.querySelectorAll('.cell');
  for(var i=0;i<rows.length;i++){
    if(!items[i])continue;
    var sv=rows[i].querySelector('.stepV'),be=rows[i].querySelector('.badge');
    var gr=sv?parseInt(sv.textContent)||items[i].g:items[i].g;
    items[i].g=gr;
    var k=items[i].k!==null?Math.round(items[i].k*gr/100):null;
    if(be)be.textContent=k!==null?fmt(k)+' kcal':'?';
    if(k!==null)t+=k;
  }
  tk.textContent=fmt(t);up(t);
}

function sv(items){
  var h=gh(),t=td();if(!h[t])h[t]=[];

  for(var i=0;i<items.length;i++){var it=items[i],k=it.k!==null?Math.round(it.k*it.g/100):0;h[t].push({f:it.l,k:k,g:it.g,tm:n})}

}
function rh(){
  var h=gh(),days=Object.keys(h).sort(function(a,b){return b.localeCompare(a)});

    var d=days[di],e=h[d],tot=e.reduce(function(s,x){return s+(x.k||0)},0);
    var dt=new Date(d+'T00:00:00'),l=dt.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'}),isT=d===td();

// ===== Events =====
fi.addEventListener('change',function(e){if(e.target.files&&e.target.files[0])loadImage(e.target.files[0]);this.value=''});
cb.addEventListener('click',function(){fi.setAttribute('capture','environment');fi.click();segs.forEach(function(s){s.classList.toggle('on',s===cb)})});
ub.addEventListener('click',function(){fi.removeAttribute('capture');fi.click();segs.forEach(function(s){s.classList.toggle('on',s===ub)})});
rm.addEventListener('click',function(e){e.stopPropagation();clearImage()});
dz.addEventListener('click',function(e){if(e.target===rm||e.target.closest('.x'))return;fi.removeAttribute('capture');fi.click()});
dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('dragover')});
dz.addEventListener('dragleave',function(){dz.classList.remove('dragover')});
dz.addEventListener('drop',function(e){e.preventDefault();dz.classList.remove('dragover');if(e.dataTransfer.files&&e.dataTransfer.files[0])loadImage(e.dataTransfer.files[0])});
ab.addEventListener('click',analyze);
ma.addEventListener('click',addM);
mi.addEventListener('keydown',function(e){if(e.key==='Enter')addM()});
ch.addEventListener('click',function(){confirmSheet('Effacer le journal','Toutes les données seront supprimées définitivement.',clr)});

// ===== Theme =====
function applyTheme(l){
  document.body.classList.toggle('light',l);
  tt.classList.toggle('l',l);
  tt.textContent=l?'blanc':'noir';
  localStorage.setItem('theme',l?'light':'dark');
}
tt.addEventListener('click',function(){applyTheme(!document.body.classList.contains('light'))});
if(localStorage.getItem('theme')==='light')applyTheme(!0);

// ===== Init =====
dl.textContent=new Date().toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'});
rh();uph();loadModel();

})();
